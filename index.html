<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MyBlog</title>
  <meta name="description" content="My personal blog" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  <link rel="icon" href="./public/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap">
          <div>
            <h1 style="margin:0">Pargame's Blog</h1>
            <p class="tagline" style="margin:4px 0 0">A place to capture and share ideas</p>
          </div>
          <nav>
            <a href="./graph.html" class="btn">Graph</a>
          </nav>
        </div>
      </div>
    </header>
    <main class="container">
      <section class="card">
  <h2>Recent posts</h2>
  <p class="legend">Showing up to 20 most recent.</p>
        <ul id="recent-list"></ul>
      </section>
    </main>
    <footer class="site-footer">
      <div class="container">
        <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between">
          <div>
            <span>© <span id="footer-year"></span> Pargame's Blog</span>
          </div>
          <div id="footer-meta"></div>
        </div>
      </div>
    </footer>
    <script src="./assets/js/footer.js"></script>
    <script>
      async function getPostsCollections() {
        try {
          const r = await fetch('./public/site.json', { cache: 'no-store' });
          if (!r.ok) return ['Posts'];
          const s = await r.json();
          const v = s.postsCollection;
          if (Array.isArray(v) && v.length) return v;
          if (typeof v === 'string' && v.trim()) return [v.trim()];
          return ['Posts'];
        } catch { return ['Posts']; }
      }

      function inPostsCollection(node, cols) {
        const topics = node.topics || [];
        return cols.some(c => node.archive === c || topics.includes(c));
      }

      async function loadRecent(){
        try {
          const res = await fetch('./public/graph.json', { cache: 'no-store' });
          if (!res.ok) return;
          const g = await res.json();
          const cols = await getPostsCollections();
          const nodes = (g.nodes||[])
            .filter(n => inPostsCollection(n, cols))
            // Exclude index/README docs from homepage
            .filter(n => (n.base||'').toLowerCase() !== 'readme' && !/\/?README$/i.test(n.id||''))
            .slice()
            .sort((a,b)=> (b.mtime||0)-(a.mtime||0))
            .slice(0, 20);
          const ul = document.getElementById('recent-list');
          if (!nodes.length) {
            ul.innerHTML = '<li class="legend">No posts yet.</li>';
            return;
          }
          ul.innerHTML = nodes.map(n => {
            const u = new URL('./viewer.html', location.href);
            u.searchParams.set('id', n.id);
            return `<li><a href="${u.toString()}">${(n.label||n.id)}</a></li>`;
          }).join('');
        } catch {}
      }
      loadRecent();
      window.populateFooter && window.populateFooter({ repo: 'pargame/MyBlog' });
    </script>
  </body>
</html>
