<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MyBlog</title>
    <meta name="description" content="나의 개인 블로그" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap">
          <div>
            <h1 style="margin:0">Pargame's Blog</h1>
            <p class="tagline" style="margin:4px 0 0">생각을 기록하고 공유하는 공간</p>
          </div>
          <nav>
            <a href="./graph.html" class="btn">그래프(A)</a>
          </nav>
        </div>
      </div>
    </header>
    <main class="container">
      <section class="card">
        <h2>최근 글</h2>
        <ul id="recent-list"></ul>
      </section>
    </main>
    <footer class="site-footer">
      <div class="container">
        <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between">
          <div>
            <span>© <span id="footer-year"></span> MyBlog</span>
          </div>
          <div>
            <span id="footer-email"></span>
            <span> · </span>
            <span id="footer-version"></span>
            <span> </span>
            <span id="footer-commit"></span>
          </div>
        </div>
      </div>
    </footer>
    <script src="./assets/js/footer.js"></script>
    <script>
      async function loadRecent(){
        try {
          const res = await fetch('./public/graph.json', { cache: 'no-store' });
          if (!res.ok) return;
          const g = await res.json();
          const nodes = (g.nodes||[]).slice().sort((a,b)=> (b.mtime||0)-(a.mtime||0)).slice(0, 20);
          const ul = document.getElementById('recent-list');
          ul.innerHTML = nodes.map(n => {
            const u = new URL('./viewer.html', location.href);
            u.searchParams.set('id', n.id);
            return `<li><a href="${u.toString()}">${(n.label||n.id)}</a> <span class="legend">${n.archive}${(n.topics&&n.topics.length)?' · '+n.topics.join(', '):''}</span></li>`;
          }).join('');
        } catch {}
      }
      loadRecent();
      window.populateFooter && window.populateFooter({ repo: 'pargame/MyBlog' });
    </script>
  </body>
</html>
