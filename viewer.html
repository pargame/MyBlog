<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>문서 뷰어</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <style>
      .md { background: var(--card); border: 1px solid #1e2749; border-radius: 12px; padding: 20px; margin: 24px 0; }
      .md h1, .md h2, .md h3 { margin-top: 1.2em; }
      .md pre { background: #0b1020; padding: 12px; border-radius: 8px; overflow: auto; }
      .md code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1 id="title">문서 뷰어</h1>
        <p class="tagline"><a href="./graph.html">← 그래프로 돌아가기</a></p>
      </div>
    </header>
    <main class="container">
      <div id="content" class="md">로딩 중…</div>
    </main>
    <footer class="site-footer">
      <div class="container"><a href="./index.html">← 홈</a></div>
    </footer>
    <script>
      function getParam(name) {
        const u = new URL(location.href);
        return u.searchParams.get(name);
      }
      function getTopicParam() {
        const u = new URL(location.href);
        return u.searchParams.get('topic');
      }
      function getArchiveParam() {
        const u = new URL(location.href);
        return u.searchParams.get('archive');
      }
      async function load() {
        const id = getParam('id');
        if (!id) {
          document.getElementById('content').textContent = 'id 파라미터가 없습니다.';
          return;
        }
        // docs/{id}.md를 그대로 불러온다 (Pages가 raw md를 서빙함)
  // id는 docs 기준의 상대경로(확장자 제외)일 수 있음
  const safe = id.replace(/\.+/g, '.') // 간단한 경로 세이프가드
      .split('/')
      .map(encodeURIComponent)
      .join('/');
  const url = `./docs/${safe}.md`;
        const res = await fetch(url);
        if (!res.ok) {
          document.getElementById('content').textContent = '문서를 불러오지 못했습니다: ' + url;
          return;
        }
        const text = await res.text();
        // 간단한 마크다운 렌더(아주 기초적인 헤더/코드/링크만)
        // 위키링크 [[Name]]를 동일 뷰어의 링크로 변환
        const topic = getTopicParam();
  const html = text
          .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
          .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
          .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>')
          .replace(/\[\[([^\]|]+)(?:\|[^\]]+)?\]\]/g, (_, p1) => {
            const targetBase = p1.trim();
            const url = new URL('./viewer.html', location.href);
            // 링크는 basename 기준으로만 연결하므로 id는 basename으로 전달
            url.searchParams.set('id', targetBase);
            if (topic) url.searchParams.set('topic', topic);
            const arch = getArchiveParam();
            if (arch) url.searchParams.set('archive', arch);
            return `<a href="${url.toString()}">${targetBase}</a>`;
          })
          .replace(/\n\n/g, '<br/><br/>' );
        document.getElementById('content').innerHTML = html;
        const title = /^#\s+(.+)$/m.exec(text)?.[1] || id;
        document.getElementById('title').textContent = title;
        const back = document.querySelector('.tagline a');
        if (back) {
          const u = new URL('./graph.html', location.href);
          if (topic) u.searchParams.set('topic', topic);
          const arch = getArchiveParam();
          if (arch) u.searchParams.set('archive', arch);
          back.href = u.toString();
        }
      }
      load();
    </script>
  </body>
  </html>
