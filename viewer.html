<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Document Viewer</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
  <link rel="icon" href="./public/favicon.svg" type="image/svg+xml" />
    <style>
      /* Things-like, high-readability theme */
      main.container { max-width: 920px; }
      .md {
        background: rgba(12,17,34,0.96);
        border: 1px solid rgba(110,168,254,0.22);
        border-radius: 14px;
        padding: 22px;
        margin: 20px 0 28px;
        line-height: 1.75;
        color: #eaf0ff;
      }
      .md h1, .md h2, .md h3, .md h4 { letter-spacing: 0.2px; line-height: 1.25; }
      .md h1 { font-size: 28px; margin: 6px 0 12px; }
      .md h2 { font-size: 22px; margin: 22px 0 8px; }
      .md h3 { font-size: 18px; margin: 18px 0 6px; }
      .md p { margin: 10px 0; }
      .md ul, .md ol { padding-left: 22px; margin: 10px 0; }
      .md li { margin: 4px 0; }
      .md hr { border: none; height: 1px; background: rgba(110,168,254,0.16); margin: 18px 0; }
      .md blockquote { margin: 10px 0; padding: 8px 12px; border-left: 3px solid rgba(110,168,254,0.35); background: rgba(110,168,254,0.08); border-radius: 8px; }
      .md table { width: 100%; border-collapse: collapse; margin: 12px 0; }
      .md th, .md td { border: 1px solid rgba(110,168,254,0.22); padding: 8px 10px; }
      .md th { background: rgba(110,168,254,0.10); text-align: left; }

      /* Code readability */
      .md pre { background: #0b1325; border: 1px solid rgba(110,168,254,0.22); padding: 14px; border-radius: 10px; overflow: auto; }
      .md code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .md pre code { font-size: 13.5px; line-height: 1.6; }
      .md :not(pre) > code { background: rgba(110,168,254,0.14); border: 1px solid rgba(110,168,254,0.22); color: #e7ecff; padding: 0 4px; border-radius: 4px; }
  /* Reader page: header should not stick on scroll */
  .site-header { position: static !important; top: auto !important; z-index: auto !important; backdrop-filter: none !important; }
  .site-header .container { padding: 12px 16px; }
      /* In graph overlay (iframe), hide header/footer for immersion */
      :root:has(body[data-embedded="1"]) .site-header { display: none !important; }
      :root:has(body[data-embedded="1"]) .site-footer { display: none !important; }
      :root:has(body[data-embedded="1"]) main.container { margin-top: 0; padding-top: 8px; }
      /* In overlay/embed, hide link legend */
      :root:has(body[data-embedded="1"]) #link-legend { display: none !important; }

  /* Unreal 아카이브 전용 강조는 유지(미묘한 차이) */
  body[data-archive="Unreal"] .md { border-color: rgba(110,168,254,0.28); }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap">
          <div>
            <a href="./index.html" class="btn">Pargame's Blog</a>
            <h1 id="title" style="margin:4px 0 0">Document Viewer</h1>
            <div id="title-meta" class="legend" style="margin-top:4px"></div>
            <p class="tagline" id="back-link" style="margin:4px 0 0; display:none"><a id="back-to-graph" href="./graph.html">← Back to Graph</a></p>
          </div>
          <nav>
            <a href="./graph.html" class="btn">Graph</a>
          </nav>
        </div>
      </div>
    </header>
    <main class="container">
  <div id="link-legend" class="card legend">Clicking [[links]] prioritizes the same archive/topic.</div>
  <div id="content" class="md">Loading…</div>
      <div id="backlinks" class="card" style="display:none">
  <h3>Backlinks</h3>
        <ul id="backlinks-list"></ul>
      </div>
    </main>
    <footer class="site-footer">
      <div class="container">
        <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between">
          <div>
            <a href="./index.html">← Home</a>
          </div>
          <div>
            <span>© <span id="footer-year"></span> Pargame's Blog</span>
          </div>
          <div id="footer-meta"></div>
        </div>
      </div>
    </footer>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <script src="./assets/js/footer.js"></script>
    <script>
  function getParam(name) {
        const u = new URL(location.href);
        return u.searchParams.get(name);
      }
      function getTopicParam() {
        const u = new URL(location.href);
        return u.searchParams.get('topic');
      }
      function getArchiveParam() {
        const u = new URL(location.href);
        return u.searchParams.get('archive');
      }
      function getFromParam() {
        const u = new URL(location.href);
        return u.searchParams.get('from');
      }

  async function load() {
        // 임베드 여부 표시(그래프 페이지 iframe에서 열릴 때)
        try { if (window.self !== window.top) document.body.setAttribute('data-embedded', '1'); } catch {}
        const idRaw = getParam('id');
        if (!idRaw) {
          document.getElementById('content').textContent = 'Missing id parameter.';
          return;
        }

        // 그래프 데이터 로드(위키링크 해석/역링크 표시용)
        let graph = null;
        try {
          const g = await fetch('./public/graph.json', { cache: 'no-store' });
          if (g.ok) graph = await g.json();
        } catch {}

  const topic = getTopicParam();
  const arch = getArchiveParam();
  // 아카이브 값을 body data-속성으로 노출(테마 제어용)
  if (arch) { try { document.body.setAttribute('data-archive', arch); } catch {} }
  // Hide legend if no archive/topic context OR when embedded in overlay
  const lg = document.getElementById('link-legend');
  if (lg) {
    const isEmbedded = document.body.getAttribute('data-embedded') === '1';
    lg.style.display = isEmbedded ? 'none' : ((topic || arch) ? '' : 'none');
  }
        const id = resolveCanonicalId(idRaw, graph, arch, topic);

        // 그래프의 노드 정보로 실제 파일 경로를 우선 사용 (posts/... 또는 docs/...)
        const nodeObj = (graph && Array.isArray(graph.nodes)) ? graph.nodes.find(n => n.id === id) : null;
        const buildSafe = (s) => s
          .replace(/\.+/g, '.')
          .split('/')
          .map(encodeURIComponent)
          .join('/');

        const tryFetch = async (paths) => {
          // Diagnostic logging: show attempted candidate URLs
          console.debug('viewer: tryFetch candidates', paths);
          for (const p of paths) {
            try {
              console.debug('viewer: attempting fetch', p);
              const r = await fetch(p);
              if (r && r.ok) {
                console.debug('viewer: fetch ok', p);
                return { res: r, urlTried: p };
              } else {
                console.debug('viewer: fetch failed', p, r && r.status);
              }
            } catch (err) {
              console.debug('viewer: fetch error', p, err && err.message);
            }
            // Try a decoded variant (help when server treats %20 differently)
            try {
              const dec = decodeURIComponent(p);
              if (dec !== p) {
                try {
                  console.debug('viewer: attempting decoded fetch', dec);
                  const r2 = await fetch(dec);
                  if (r2 && r2.ok) return { res: r2, urlTried: dec };
                } catch (err2) {
                  console.debug('viewer: decoded fetch error', dec, err2 && err2.message);
                }
              }
            } catch (e) {}
          }
          return { res: null, urlTried: paths[paths.length - 1] };
        };

        let primaryUrl = null;
        let primaryRaw = null;
        if (nodeObj && nodeObj.file) {
          const clean = nodeObj.file.replace(/^\.\//, '');
          // Encode each segment to support spaces and special characters in filenames
          primaryUrl = `./${clean.split('/').map(encodeURIComponent).join('/')}`;
          // Also try the raw recorded path (unencoded)
          primaryRaw = `./${clean}`;
        }
  const safe = buildSafe(id);
  const candidates = [];
        // Prefer the direct file recorded in graph.json (encoded/raw variants)
        if (primaryUrl) candidates.push(primaryUrl);
        if (primaryRaw && primaryRaw !== primaryUrl) candidates.push(primaryRaw);
        // Also try a decoded variant in case the server treats %20 differently
        try { if (primaryUrl) candidates.push(decodeURIComponent(primaryUrl)); } catch(e){}

        // Heuristics if graph lookup failed
        candidates.push(`./posts/${safe}.md`);
  // Archive-aware candidates: try both encoded and raw archive folder names and multiple basename variants
  if (arch) {
    try { candidates.push(`./docs/${encodeURIComponent(arch)}/${safe}.md`); } catch(e){}
    candidates.push(`./docs/${arch}/${safe}.md`);
    // id may already include the archive; try the last path segment as filename
    const last = id.split('/').slice(-1)[0];
    candidates.push(`./docs/${arch}/${last}.md`);
  }
  // Fallback to top-level docs folder (safe and raw)
  candidates.push(`./docs/${safe}.md`);
  candidates.push(`./docs/${id.split('/').slice(-1)[0]}.md`);
  // Also try parent-level docs/posts in case files are served from repo root rather than public/
  candidates.push(`../docs/${encodeURIComponent(arch || '')}/${safe}.md`);
  candidates.push(`../docs/${safe}.md`);
  candidates.push(`../posts/${safe}.md`);
  // Also try public/ prefixed locations (when site is served from repo root but built files are under public/)
  if (primaryUrl) candidates.push(primaryUrl.replace(/^\.\//, './public/'));
  if (primaryRaw) candidates.push(primaryRaw.replace(/^\.\//, './public/'));
  try { candidates.push(decodeURIComponent(`./public/docs/${encodeURIComponent(arch || '')}/${safe}.md`)); } catch(e){}
  candidates.push(`./public/docs/${arch || ''}/${safe}.md`);
  candidates.push(`./public/docs/${safe}.md`);
  candidates.push(`./public/posts/${safe}.md`);

        const { res, urlTried } = await tryFetch(candidates);
        if (!res) {
          document.getElementById('content').textContent = 'Failed to load: ' + urlTried;
          return;
        }
        const text = await res.text();
        await renderMarkdown(text, graph, arch, topic);
  // Avoid passing accidental global 'title' element; let finalize extract from content
  finalize(null, graph, id, topic, arch);
  // Inform parent (graph page) of current id to sync highlight (one-shot after load)
  try {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'viewer:navigate', id }, '*');
    }
  } catch {}
      }

      async function renderMarkdown(text, graph, arch, topic) {
        // 0) frontmatter 제거(파일 맨 위의 YAML 블록 --- ... ---)
        function stripFrontmatter(src){
          // BOM/공백, LF/CRLF 모두 허용
          const re = /^(?:\uFEFF)?\s*---[ \t]*\r?\n[\s\S]*?\r?\n---[ \t]*\r?\n?/;
          return src.replace(re, '');
        }
        const withoutFM = stripFrontmatter(text);
        // 1) 위키링크를 viewer 내부 링크로 선치환
        const linkRegex = /\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g;
        const preprocessed = withoutFM.replace(linkRegex, (_, p1, alias) => {
          const base = (p1 || '').trim();
          const resolved = resolveByBasename(base, graph, arch, topic) || base;
          const u2 = new URL('./viewer.html', location.href);
          u2.searchParams.set('id', resolved);
          if (topic) u2.searchParams.set('topic', topic);
          if (arch) u2.searchParams.set('archive', arch);
          const from = getFromParam();
          if (from) u2.searchParams.set('from', from);
          const label = (alias || '').trim() || base;
          return `[${label}](${u2.toString()})`;
        });

        // 2) marked로 HTML 변환 후 DOMPurify로 정화
        const rawHtml = marked.parse(preprocessed, { mangle: false, headerIds: true });
  const safeHtml = DOMPurify.sanitize(rawHtml);
        document.getElementById('content').innerHTML = safeHtml;
        // Unreal 문서의 시작 부분에 관용적으로 들어간 --- 라인 1~2개 제거
        try {
          if (arch === 'Unreal') {
            const cont = document.getElementById('content');
            let removed = 0;
            while (cont.firstElementChild && cont.firstElementChild.tagName === 'HR' && removed < 2) {
              cont.removeChild(cont.firstElementChild);
              removed++;
            }
          }
        } catch {}
        // 코드 하이라이트 적용
        document.querySelectorAll('#content pre code').forEach((el) => {
          try { window.hljs && window.hljs.highlightElement(el); } catch {}
        });
      }

      function finalize(titleCandidate, graph, id, topic, arch) {
        // Prefer the first H1 inside content; fallback to candidate or id
        const h1 = document.querySelector('#content h1');
        const title = (titleCandidate && String(titleCandidate)) || (h1 && h1.textContent && h1.textContent.trim()) || id;
        document.getElementById('title').textContent = title;
        // Title meta (date · author)
        try {
          const metaEl = document.getElementById('title-meta');
          const node = (graph && Array.isArray(graph.nodes)) ? graph.nodes.find(n => n.id === id) : null;
          const author = (node && node.author) ? String(node.author).trim() : '';
          const date = (node && node.date) ? String(node.date).slice(0, 10) : '';
          const parts = [];
          if (date) parts.push(date);
          if (author) parts.push(author);
          metaEl.textContent = parts.join(' · ');
          metaEl.style.display = parts.length ? '' : 'none';
        } catch {}
        // Back to Graph: 독립 페이지일 땐 숨김, 그래프에서 온 경우에만 표시
        try {
          const from = getFromParam();
          const isEmbedded = document.body.getAttribute('data-embedded') === '1';
          const backWrap = document.getElementById('back-link');
          const back = document.getElementById('back-to-graph');
          if (!isEmbedded && from === 'graph' && back && backWrap) {
            const u = new URL('./graph.html', location.href);
            if (topic) u.searchParams.set('topic', topic);
            if (arch) u.searchParams.set('archive', arch);
            back.href = u.toString();
            backWrap.style.display = '';
          } else if (backWrap) {
            backWrap.style.display = 'none';
          }
        } catch {}
        if (graph) {
          const backlinks = findBacklinks(graph, id);
          if (backlinks.length) {
            const panel = document.getElementById('backlinks');
            const list = document.getElementById('backlinks-list');
            list.innerHTML = backlinks.map(n => {
              const to = new URL('./viewer.html', location.href);
              to.searchParams.set('id', n.id);
              if (topic) to.searchParams.set('topic', topic);
              if (arch) to.searchParams.set('archive', arch);
              const meta = `${n.archive}${(n.topics && n.topics.length) ? ' · ' + n.topics.join(', ') : ''}`;
              return `<li><a href="${to.toString()}">${escapeHtml(n.label || n.id)}</a> <span class="legend">(${escapeHtml(meta)})</span></li>`;
            }).join('');
            panel.style.display = '';
          }
        }
      }

      function resolveCanonicalId(idRaw, graph, arch, topic) {
        // idRaw가 경로를 포함하면 그대로 사용
        if (idRaw.includes('/')) return idRaw;
        if (!graph) return idRaw;
        const base = idRaw;
        const nodes = graph.nodes || [];
        const pool = nodes.filter(n => n.base === base);
        if (!pool.length) return idRaw;
        // 우선순위: arch+topic -> arch -> topic -> 아무거나
        let cand = null;
        if (arch && topic) cand = pool.find(n => n.archive === arch && (n.topics||[]).includes(topic));
        if (!cand && arch) cand = pool.find(n => n.archive === arch);
        if (!cand && topic) cand = pool.find(n => (n.topics||[]).includes(topic));
        if (!cand) cand = pool[0];
        return cand ? cand.id : idRaw;
      }

      function resolveByBasename(base, graph, arch, topic) {
        if (!graph) return null;
        const nodes = graph.nodes || [];
        const pool = nodes.filter(n => n.base === base);
        if (!pool.length) return null;
        let cand = null;
        if (arch && topic) cand = pool.find(n => n.archive === arch && (n.topics||[]).includes(topic));
        if (!cand && arch) cand = pool.find(n => n.archive === arch);
        if (!cand && topic) cand = pool.find(n => (n.topics||[]).includes(topic));
        if (!cand) cand = pool[0];
        return cand ? cand.id : null;
      }

      function findBacklinks(graph, id) {
        if (!graph) return [];
        const incoming = (graph.edges || []).filter(e => (e.target === id));
        const byId = new Map((graph.nodes || []).map(n => [n.id, n]));
        return incoming.map(e => byId.get(e.source)).filter(Boolean);
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]));
      }

      load();
      window.populateFooter && window.populateFooter({ repo: 'pargame/MyBlog' });
    </script>
  </body>
  </html>
