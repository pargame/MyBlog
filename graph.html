<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Graph View</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
  <link rel="icon" href="./public/favicon.svg" type="image/svg+xml" />
    <style>
  .legend { color: var(--muted); font-size: 14px; }
  /* Page: Graph — header should NOT stick on long scroll */
  .site-header { position: static !important; top: auto !important; z-index: auto !important; backdrop-filter: none !important; }
  .site-header .container { padding: 8px 16px; }
  
  /* Fullscreen immersive graph */
  .fullscreen-graph { padding: 0; margin: 0; }
  .graph-container { 
    position: relative; 
    width: 100vw; 
    height: calc(100vh - 80px); /* Account for compact header */
    background: var(--bg);
    overflow: hidden;
  }
  
  #graph { 
    width: 100%; 
    height: 100%; 
    position: relative; 
  }
  
  /* Inline overlays within graph */
  .graph-overlay {
    position: absolute;
    z-index: 10;
    background: rgba(11,16,32,0.85);
    border: 1px solid rgba(30,39,73,0.6);
    border-radius: 12px;
    padding: 8px;
    backdrop-filter: blur(8px);
  transition: all .25s ease;
    pointer-events: auto;
  }
  
  .graph-overlay.top-left { top: 16px; left: 16px; }
  .graph-overlay.top-right { top: 16px; right: 16px; }
  /* Search box centered at top */
  .graph-overlay.search-box { 
    top: 16px; 
    left: 50%; 
    transform: translateX(-50%);
    max-width: 520px;
    width: calc(100vw - 32px);
  z-index: 12;
  }
  
  .graph-overlay .body { 
    display: block; 
    margin-top: 8px; 
    max-width: 520px;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transform: translateY(-4px);
    transition: max-height .28s ease, opacity .22s ease, transform .28s ease;
  }
  .graph-overlay.show .body { 
    max-height: 420px; 
    overflow-y: auto; 
    opacity: 1;
    transform: translateY(0);
  }
  
  .graph-overlay .row { 
    display: flex; 
    gap: 8px; 
    align-items: center; 
    flex-wrap: wrap; 
    margin: 4px 0;
  }
  
  /* Document overlay (right side) */
  .document-overlay {
    position: absolute;
    top: 0;
    right: 0;
    width: 0;
    height: 100%;
    background: var(--card);
    border-left: 1px solid var(--border);
    z-index: 20;
    transition: width .4s ease;
    overflow: hidden;
  }
  
  .document-overlay.open {
    width: 45%;
  }
  
  .close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(238,96,85,0.8);
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    color: white;
    cursor: pointer;
    font-size: 18px;
    z-index: 21;
  }
  
  #doc-frame {
    width: 100%;
    height: 100%;
    border: none;
    background: var(--bg);
  }
  
  /* Search results */
  #search-results {
    list-style: none;
    padding: 0;
    margin: 8px 0 0;
  }
  
  #search-results li {
    margin: 4px 0;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
  }
  
  #search-results li:hover {
    background: rgba(110,168,254,0.2);
  }
  
  /* zoom-controls removed per request */
  
      .node { cursor: pointer; }
  .node circle { fill: #6ea8fe; }
  .node.topic-ROOT circle { fill: #6ea8fe; }
  .node.topic-1 circle { fill: #60d394; }
  .node.topic-2 circle { fill: #ee6055; }
  .node.topic-3 circle { fill: #ffd97d; }
  .node.topic-4 circle { fill: #aaf683; }
  .node.topic-5 circle { fill: #57c7ff; }
      .node text { fill: #e7ecff; font-size: 12px; }
      .link { stroke: #3a4b86; stroke-opacity: .6; }
      .link:hover { stroke-opacity: 1; }
  .faded { opacity: 0.15; }
  .node.selected circle { stroke: #ffd97d; stroke-width: 3px; }
  /* Isolated nodes (no links) */
  .node.isolated circle { fill: #5b6a8a !important; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap">
          <div>
            <a href="./index.html" class="btn">Pargame's Blog</a>
            <h1 style="margin:6px 0 0">Knowledge Graph</h1>
            <p class="tagline" style="margin:4px 0 0">The graph updates based on archive and topic filters.</p>
          </div>
          <nav>
            <a href="./graph.html" class="btn active">Graph</a>
          </nav>
        </div>
      </div>
    </header>
    <main class="fullscreen-graph">
      <!-- Immersive full-screen graph with inline controls -->
      <div class="graph-container">
        <div id="graph"></div>
        
        <!-- Settings overlay (top-left) -->
        <div id="graph-ctl" class="graph-overlay top-left">
          <div class="row">
            <button id="ctl-toggle" class="btn" title="Toggle graph settings" aria-label="Toggle graph settings">⚙ Settings</button>
            <button id="ctl-reset" class="btn">Reset</button>
          </div>
          <div class="body">
            <div class="row"><label>Link distance <input id="ctl-distance" type="range" min="40" max="240" value="120" data-default="120" /> <span id="val-distance" class="legend"></span></label></div>
            <div class="row"><label>Repulsion <input id="ctl-charge" type="range" min="-800" max="-50" value="-320" data-default="-320" /> <span id="val-charge" class="legend"></span></label></div>
            <div class="row"><label>Link width <input id="ctl-width" type="range" min="1" max="6" value="2" data-default="2" /> <span id="val-width" class="legend"></span></label></div>
            <div class="row"><label>Node size <input id="ctl-size" type="range" min="6" max="26" value="6" data-default="6" /> <span id="val-size" class="legend"></span></label></div>
            <div class="row"><label>Focus zoom <input id="ctl-focus" type="range" min="0.8" max="2" step="0.1" value="1.2" data-default="1.2" /> <span id="val-focus" class="legend"></span></label></div>
            <div class="row"><label>Overlay idle <input id="ctl-timeout" type="range" min="1" max="6" step="0.5" value="2.5" data-default="2.5" /> <span id="val-timeout" class="legend"></span><span class="legend">s</span></label></div>
          </div>
        </div>

        <!-- Archive selector (top-right) -->
        <div id="archive-ctl" class="graph-overlay top-right">
          <button id="archive-toggle" class="btn">Archive</button>
          <div id="archive-body" class="body">
            <span id="archives"></span>
          </div>
        </div>

  <!-- Zoom controls removed -->

        <!-- Search (top-right, below zoom) -->
        <div id="search-ctl" class="graph-overlay top-right search-box">
          <button id="search-toggle" class="btn">🔍 Search</button>
          <div id="search-body" class="body">
            <input id="doc-search" type="search" placeholder="Search documents..." aria-label="Search documents" />
            <span id="search-count" class="legend"></span>
            <ul id="search-results"></ul>
          </div>
        </div>

        <!-- Document overlay (right side) -->
        <div id="doc-overlay" class="document-overlay">
          <button id="close-doc-overlay" class="close-btn">×</button>
          <iframe id="doc-frame" src="about:blank"></iframe>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      <div class="container">
        <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between">
          <div>
            <a href="./index.html">← Home</a>
          </div>
          <div>
            <span>© <span id="footer-year"></span> Pargame's Blog</span>
          </div>
          <div id="footer-meta"></div>
        </div>
      </div>
    </footer>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="./assets/js/footer.js"></script>
    <script>
    // Graph state/selectors
        let FULL = null; // 전체 데이터
        let CUR = null;  // 필터된 현재 데이터
        let simulation = null;
  let svg = null, inner = null, linkSel = null, nodeSel = null;
  let zoomBehavior = null;
  let currentTransform = d3.zoomIdentity;
        let degMap = null;
  let selectedId = null;
  let pendingFocus = null;
  let GRAPH_W = null, GRAPH_H = null;
  // Graph state
  let isolatedIds = new Set();
  let isOverlayOpen = false;

  async function load() {
        const res = await fetch('./public/graph.json', { cache: 'no-store' });
        if (!res.ok) {
          document.getElementById('graph').innerHTML = 'Graph is not generated yet. (missing graph.json)';
          return;
        }
          const data = await res.json();
          FULL = data;
          setupArchives(FULL);
          setupSearch(FULL);
          setupControls();
          setupOverlay();
          rerender(FULL);
  // On resize, reset cached dimensions and rerender
          window.addEventListener('resize', () => { GRAPH_W = null; GRAPH_H = null; rerender(); });
      }

  // Default archive is ALL; URL param can override in setupArchives
  let state = { archive: 'ALL', topic: null };
      function getSelectedArchive(){ return state.archive; }
      function getSelectedTopic(){ return state.topic || null; }
      function setSelectedArchive(a){ state.archive = a || 'ALL'; setURL(); }
      function clearTopic(){ state.topic = null; setURL(); }
      function setSingleTopic(t){ state.topic = (t && t !== 'ALL') ? t : null; setURL(); }
      function setURL(){
        const u = new URL(location.href);
        if (state.archive && state.archive !== 'ALL') u.searchParams.set('archive', state.archive); else u.searchParams.delete('archive');
        // sync single topic
        if (state.topic) u.searchParams.set('topic', state.topic); else u.searchParams.delete('topic');
        history.replaceState({}, '', u);
      }

      function setupArchives(data){
        const u = new URL(location.href);
        const archiveParam = u.searchParams.get('archive');
        if (archiveParam) setSelectedArchive(archiveParam);
        const container = document.getElementById('archives');
        // Archive 목록은 posts/ 파일을 제외한 데이터로부터 유도
        const docNodes = (data.nodes || []).filter(n => !isPost(n));
        const uniq = Array.from(new Set(docNodes.map(n => n.archive))).sort();
        const label = (a) => (a === '(default)') ? 'Default' : a;
        const btns = ['ALL', ...uniq].map(a => `<button class="btn" data-arch="${a}">${a === 'ALL' ? 'All' : label(a)}</button>`).join('');
        container.innerHTML = btns;
        const buttons = container.querySelectorAll('button');
        function refreshActive(){ buttons.forEach(b => b.classList.toggle('active', b.getAttribute('data-arch')===getSelectedArchive())); }
        buttons.forEach(btn => btn.addEventListener('click', () => { 
          setSelectedArchive(btn.getAttribute('data-arch')); 
          refreshActive(); 
          rerender(); 
          document.getElementById('archive-ctl').classList.remove('show');
        }));
        // 기본값은 All 유지 (URL 파라미터가 있으면 반영)
        refreshActive();
        
        // Archive toggle button
        const archToggle = document.getElementById('archive-toggle');
        if (archToggle) archToggle.addEventListener('click', () => {
          document.getElementById('archive-ctl').classList.toggle('show');
        });
      }

      function setupSearch(data) {
        const toggle = document.getElementById('search-toggle');
        const body = document.getElementById('search-body');
        const input = document.getElementById('doc-search');
        const results = document.getElementById('search-results');
        const count = document.getElementById('search-count');
        
        toggle.addEventListener('click', () => {
          document.getElementById('search-ctl').classList.toggle('show');
          if (document.getElementById('search-ctl').classList.contains('show')) {
            input.focus();
          }
        });
        
        input.addEventListener('input', () => {
          const query = input.value.trim().toLowerCase();
          if (!query) {
            results.innerHTML = '';
            count.textContent = '';
            return;
          }
          
          const arch = getSelectedArchive();
          let nodes = (data.nodes || []).filter(n => !isPost(n));
          if (arch && arch !== 'ALL') nodes = nodes.filter(n => n.archive === arch);
          
          const filtered = nodes.filter(n => {
            const label = (n.label||'').toLowerCase();
            const id = (n.id||'').toLowerCase();
            const topics = (n.topics||[]).join(' ').toLowerCase();
            return label.includes(query) || id.includes(query) || topics.includes(query);
          }).slice(0, 10); // Limit results
          
          count.textContent = `${filtered.length} results`;
          results.innerHTML = filtered.map(n => 
            `<li data-id="${n.id}">${n.label || n.id}</li>`
          ).join('');
          
          results.querySelectorAll('li').forEach(li => {
            li.addEventListener('click', () => {
              const id = li.getAttribute('data-id');
              openDocumentOverlay(id);
              document.getElementById('search-ctl').classList.remove('show');
            });
          });
        });
      }

      function setupOverlay() {
        const overlay = document.getElementById('doc-overlay');
        const closeBtn = document.getElementById('close-doc-overlay');
        
        closeBtn.addEventListener('click', closeDocumentOverlay);
        
        // Close on click outside overlay
        document.addEventListener('click', (e) => {
          if (isOverlayOpen && !overlay.contains(e.target) && !e.target.closest('.node')) {
            closeDocumentOverlay();
          }
        });
        
        // Close on ESC key
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && isOverlayOpen) {
            closeDocumentOverlay();
          }
        });
      }

      function openDocumentOverlay(id) {
        isOverlayOpen = true;
        const overlay = document.getElementById('doc-overlay');
        const frame = document.getElementById('doc-frame');
        setSelected(id);

        // Prepare document URL
        const url = new URL('./viewer.html', location.href);
        url.searchParams.set('id', id);
        const arch = getSelectedArchive();
        if (arch && arch !== 'ALL') url.searchParams.set('archive', arch);
        url.searchParams.set('from', 'graph');

        // Open overlay first so layout/width is final, then focus
        frame.src = url.toString();
        overlay.classList.add('open');

        const focusAfterOpen = () => focusNodeById(id, { offsetX: -0.225 });
        const onEnd = (e) => {
          if (e.propertyName === 'width') {
            overlay.removeEventListener('transitionend', onEnd);
            focusAfterOpen();
          }
        };
        try { overlay.addEventListener('transitionend', onEnd, { once: true }); } catch { overlay.addEventListener('transitionend', onEnd); }
        // Fallback in case transition event is missed
        setTimeout(focusAfterOpen, 480);
      }

      function closeDocumentOverlay() {
        isOverlayOpen = false;
        const overlay = document.getElementById('doc-overlay');
        const frame = document.getElementById('doc-frame');
        
  overlay.classList.remove('open');
  frame.src = 'about:blank';
      }

      function filter(data, archive) {
        // posts/ 파일은 그래프에서 제외
        let nodes = (data.nodes || []).filter(n => !isPost(n));
        if (archive && archive !== 'ALL') nodes = nodes.filter(n => n.archive === archive);
        const ids = new Set(nodes.map(n => n.id));
        const edges = data.edges.filter(e => {
          const s = (e && e.source && e.source.id) ? e.source.id : e.source;
          const t = (e && e.target && e.target.id) ? e.target.id : e.target;
          return ids.has(s) && ids.has(t);
        });
        return { nodes, edges };
      }

      function setupControls(){
        const vd = document.getElementById('val-distance');
        const vc = document.getElementById('val-charge');
        const vw = document.getElementById('val-width');
        const vs = document.getElementById('val-size');
        const vf = document.getElementById('val-focus');
        const vt = document.getElementById('val-timeout');
  const wrap = document.getElementById('graph-ctl');
  const toggle = document.getElementById('ctl-toggle');
        function syncVals(){
          if(vd) vd.textContent = document.getElementById('ctl-distance').value;
          if(vc) vc.textContent = document.getElementById('ctl-charge').value;
          if(vw) vw.textContent = document.getElementById('ctl-width').value;
          if(vs) vs.textContent = document.getElementById('ctl-size').value;
          if(vf) vf.textContent = document.getElementById('ctl-focus').value;
          if(vt) vt.textContent = document.getElementById('ctl-timeout').value;
        }
        syncVals();
        document.getElementById('ctl-distance').addEventListener('input', () => { syncVals(); updateForces(); });
        document.getElementById('ctl-charge').addEventListener('input', () => { syncVals(); updateForces(); });
        document.getElementById('ctl-width').addEventListener('input', () => { syncVals(); updateStyles(); });
        document.getElementById('ctl-size').addEventListener('input', () => { syncVals(); updateStyles(); });
        document.getElementById('ctl-focus').addEventListener('input', () => { syncVals(); });
        document.getElementById('ctl-timeout').addEventListener('input', () => { syncVals(); });
        const btn = document.getElementById('ctl-reset');
        if (btn) btn.addEventListener('click', () => {
          ['ctl-distance','ctl-charge','ctl-width','ctl-size','ctl-focus','ctl-timeout'].forEach(id => {
            const el = document.getElementById(id);
            const def = el.getAttribute('data-default');
            if (def != null) el.value = def;
          });
          syncVals();
          updateStyles();
          updateForces();
        });
  if (toggle && wrap) toggle.addEventListener('click', () => { wrap.classList.toggle('show'); });
      }

      function rerender(full){
        // full 데이터가 없으면 다시 불러옴
        if (!full) {
          if (!FULL) return;
          renderGraph(filter(FULL, getSelectedArchive()));
        } else {
          renderGraph(filter(full, getSelectedArchive()));
        }
      }

  function renderGraph(data) {
  const box = document.getElementById('graph');
  const rect = box.getBoundingClientRect();
  GRAPH_W = rect.width;
  GRAPH_H = rect.height;
  
  const width = GRAPH_W;
  const height = GRAPH_H;
  d3.select('#graph').selectAll('*').remove();
  svg = d3.select('#graph').append('svg').attr('width', width).attr('height', height);
  inner = svg.append('g');
  // Apply previous transform so zoom/pan persists across rerenders
  try { if (currentTransform) inner.attr('transform', currentTransform); } catch {}

        const distance = +document.getElementById('ctl-distance').value;
        const charge = +document.getElementById('ctl-charge').value;
        const linkWidth = +document.getElementById('ctl-width').value;
        const sizeBase = +document.getElementById('ctl-size').value;

        simulation = d3.forceSimulation(data.nodes)
          .force('link', d3.forceLink(data.edges).id(d => d.id).distance(distance))
          .force('charge', d3.forceManyBody().strength(charge))
          .force('center', d3.forceCenter(width / 2, height / 2))
          .alpha(1)
          .alphaDecay(0.03)
          .velocityDecay(0.2);

        linkSel = inner.append('g').selectAll('line')
          .data(data.edges)
          .enter().append('line')
          .attr('class', 'link')
          .attr('stroke-width', linkWidth);

        const topicKey = (topics) => {
          const t = (topics && topics.length) ? topics[0] : '(root)';
          return (t && t !== '(root)') ? `topic-${(Math.abs(hashCode(t)) % 5) + 1}` : 'topic-ROOT';
        };
  nodeSel = inner.append('g').selectAll('g')
          .data(data.nodes)
          .enter().append('g')
          .attr('class', d => `node ${topicKey(d.topics)}`)
          .call(d3.drag()
            .on('start', dragstarted)
            .on('drag', dragged)
            .on('end', dragended));

        // 차수 기반 반지름 계산
        degMap = new Map(data.nodes.map(n => [n.id, 0]));
        for (const e of data.edges) {
          const s = e.source.id || e.source;
          const t = e.target.id || e.target;
          degMap.set(s, (degMap.get(s) || 0) + 1);
          degMap.set(t, (degMap.get(t) || 0) + 1);
        }
  // Mark isolated nodes
  isolatedIds = new Set(data.nodes.filter(n => (degMap.get(n.id) || 0) === 0).map(n => n.id));
  const radius = d => Math.max(sizeBase, Math.min(sizeBase+16, sizeBase + Math.sqrt(degMap.get(d.id) || 0) * 4));

  // 충돌 방지(물리감 향상)
  simulation.force('collide', d3.forceCollide(radius).strength(0.7));

  nodeSel.append('circle').attr('r', radius).attr('stroke-width', Math.max(1, linkWidth/2));
  nodeSel.append('text').attr('x', 12).attr('y', 4).text(d => d.label || d.id);
  nodeSel.classed('isolated', d => isolatedIds.has(d.id));

  // Node click opens overlay instead of iframe
  nodeSel.on('click', (_, d) => {
    openDocumentOverlay(d.id);
  });

  simulation.on('tick', () => {
    linkSel
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
        });

        function dragstarted(event) {
          if (!event.active) simulation.alphaTarget(0.3).restart();
          event.subject.fx = event.subject.x;
          event.subject.fy = event.subject.y;
        }
        function dragged(event) {
          event.subject.fx = event.x;
          event.subject.fy = event.y;
        }
        function dragended(event) {
          if (!event.active) simulation.alphaTarget(0);
          event.subject.fx = null;
          event.subject.fy = null;
        }

        function hashCode(str){
          let h = 0; for (let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i); h|=0;} return h;
        }

          // 줌/팬: 마우스/트랙패드 기본 제스처만 허용 (± 버튼 제거)
          zoomBehavior = d3.zoom()
            .scaleExtent([0.2, 3])
            .on('zoom', (ev) => {
              currentTransform = ev.transform;
              inner.attr('transform', currentTransform);
            });
        svg.call(zoomBehavior);
        // Reapply any existing transform after (re)binding zoom
        try { if (currentTransform) svg.call(zoomBehavior.transform, currentTransform); } catch {}

        // 이웃 하이라이트
        const adj = new Map();
        for (const n of data.nodes) adj.set(n.id, new Set());
        for (const e of data.edges) {
          const s = e.source.id || e.source;
          const t = e.target.id || e.target;
          adj.get(s).add(t);
          adj.get(t).add(s);
        }
        nodeSel.on('mouseover', (_, d) => highlight(d.id));
        nodeSel.on('mouseout', clearHighlight);
        function highlight(id){
          nodeSel.classed('faded', n => (n.id !== id && !adj.get(id).has(n.id)));
          linkSel.classed('faded', e => {
            const s = e.source.id || e.source;
            const t = e.target.id || e.target;
            return !(s === id || t === id);
          });
        }
        function clearHighlight(){
          nodeSel.classed('faded', false);
          linkSel.classed('faded', false);
        }

        CUR = data;
        // 초기 스타일 동기화
        updateStyles();
      }      function setSelected(id){
        selectedId = id;
        if (nodeSel) nodeSel.classed('selected', n => n.id === selectedId);
      }

      function getFocusScale(){
        const el = document.getElementById('ctl-focus');
        if (!el) return 1.2;
        const v = parseFloat(el.value);
        return isNaN(v) ? 1.2 : v;
      }

      function focusNodeById(id, opts={}){
        try {
          if (!svg || !inner || !zoomBehavior || !CUR) return;
          const n = (CUR.nodes||[]).find(x => x.id === id);
          if (!n) return;
          if (typeof n.x !== 'number' || typeof n.y !== 'number') {
            // Retry a few times until layout stabilizes
            const tries = (pendingFocus && pendingFocus.id === id) ? pendingFocus.tries + 1 : 0;
            if (tries < 15) {
              pendingFocus = { id, tries };
              setTimeout(() => focusNodeById(id, opts), 80);
            } else {
              pendingFocus = null;
            }
            return;
          }
          const scale = typeof opts.scale === 'number' ? opts.scale : getFocusScale();
          const width = GRAPH_W||inner.node().ownerSVGElement.clientWidth||600;
          const height = GRAPH_H||inner.node().ownerSVGElement.clientHeight||600;
          
          // Apply offset for document overlay positioning
          const offsetX = opts.offsetX || 0;
          const offsetY = opts.offsetY || 0;
          
          const tx = (width/2) + (width * offsetX) - n.x * scale;
          const ty = (height/2) + (height * offsetY) - n.y * scale;
          const t = d3.zoomIdentity.translate(tx, ty).scale(scale);
          svg.transition().duration(450).call(zoomBehavior.transform, t);
          pendingFocus = null;
        } catch {}
      }

      function isPost(n){
        const f = (n && n.file) ? String(n.file).replace(/^\.\//,'') : '';
        return f.startsWith('posts/');
      }

      function updateForces(){
        if (!simulation) return;
        const distance = +document.getElementById('ctl-distance').value;
        const charge = +document.getElementById('ctl-charge').value;
        const linkForce = simulation.force('link');
        if (linkForce) linkForce.distance(distance);
        const chargeForce = simulation.force('charge');
        if (chargeForce) chargeForce.strength(charge);
        simulation.alpha(0.3).restart();
      }

      function updateStyles(){
        if (!linkSel || !nodeSel) return;
        const linkWidth = +document.getElementById('ctl-width').value;
        const sizeBase = +document.getElementById('ctl-size').value;
        linkSel.attr('stroke-width', linkWidth);
        const radius = d => Math.max(sizeBase, Math.min(sizeBase+16, sizeBase + Math.sqrt(degMap ? (degMap.get(d.id) || 0) : 0) * 4));
        nodeSel.select('circle').attr('r', radius).attr('stroke-width', Math.max(1, linkWidth/2));
        // 충돌 반경도 갱신
        if (simulation) {
          const col = simulation.force('collide');
          if (col) col.radius(radius);
          simulation.alpha(0.15).restart();
        }
        // 선택 노드 강조 유지
        nodeSel.classed('selected', n => n.id === selectedId);
      }

  load();
  // populate footer with repo info
  window.populateFooter && window.populateFooter({ repo: 'pargame/MyBlog' });
  // Receive navigation messages from viewer to update highlight
  window.addEventListener('message', (ev) => {
    try {
      const d = ev.data || {};
      if (d && d.type === 'viewer:navigate' && d.id) {
        const id = String(d.id);
        setSelected(id);
        // If overlay is open, keep node centered in left pane
        focusNodeById(id, { offsetX: isOverlayOpen ? -0.225 : 0 });
      }
    } catch {}
  });

    </script>
  </body>
  </html>
