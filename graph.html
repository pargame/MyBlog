<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>그래프 뷰</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
  <link rel="icon" href="./public/favicon.svg" type="image/svg+xml" />
    <style>
  .legend { color: var(--muted); font-size: 14px; }
      .node { cursor: pointer; }
  .node circle { fill: #6ea8fe; }
  .node.topic-ROOT circle { fill: #6ea8fe; }
  .node.topic-1 circle { fill: #60d394; }
  .node.topic-2 circle { fill: #ee6055; }
  .node.topic-3 circle { fill: #ffd97d; }
  .node.topic-4 circle { fill: #aaf683; }
  .node.topic-5 circle { fill: #57c7ff; }
      .node text { fill: #e7ecff; font-size: 12px; }
      .link { stroke: #3a4b86; stroke-opacity: .6; }
      .link:hover { stroke-opacity: 1; }
  .faded { opacity: 0.15; }
  .node.selected circle { stroke: #ffd97d; stroke-width: 3px; }
  .ctrls label { margin-right: 16px; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap">
          <div>
            <a href="./index.html" class="btn">Pargame's Blog</a>
            <h1 style="margin:6px 0 0">지식 그래프</h1>
            <p class="tagline" style="margin:4px 0 0">아카이브와 주제 선택에 따라 그래프가 바뀝니다.</p>
          </div>
          <nav>
            <a href="./graph.html" class="btn active">그래프</a>
          </nav>
        </div>
      </div>
    </header>
    <main class="container">
      <!-- 아카이브 선택 -->
      <div class="card" id="A-b">
        <strong>아카이브</strong>
        <span id="archives"></span>
      </div>

      <!-- 그래프 컨트롤 + 그래프 -->
      <div class="card ctrls" id="controls">
  <strong>그래프 설정</strong>
  <label>링크 거리 <input id="ctl-distance" type="range" min="40" max="240" value="120" data-default="120" /> <span id="val-distance" class="legend"></span></label>
  <label>반발력 <input id="ctl-charge" type="range" min="-800" max="-50" value="-320" data-default="-320" /> <span id="val-charge" class="legend"></span></label>
  <label>링크 굵기 <input id="ctl-width" type="range" min="1" max="6" value="2" data-default="2" /> <span id="val-width" class="legend"></span></label>
  <label>노드 크기 <input id="ctl-size" type="range" min="6" max="26" value="6" data-default="6" /> <span id="val-size" class="legend"></span></label>
  <button id="ctl-reset" class="btn">reset</button>
  <span class="legend">드래그/휠로 이동·확대/축소. 노드 클릭 시 아래 뷰어에 문서가 열립니다.</span>
      </div>
      <div class="graph-wrap" id="graph"></div>

      <!-- 주제 선택 -->
      <div class="card" id="A-c">
  <strong>주제</strong>
  <label style="margin-left:8px"><input type="checkbox" id="topic-multi" /> 다중 선택(AND)</label>
        <button id="topic-reset" class="btn">reset</button>
        <span id="topics"></span>
      </div>

    <!-- 문서 목록 / 뷰어 -->
    <div class="card" id="A-de">
        <div>
      <h3>문서 목록</h3>
          <ul id="doc-list"></ul>
        </div>
        <div>
      <h3>문서 뷰어</h3>
          <iframe id="doc-view" style="width:100%;height:420px;border:1px solid #1e2749;border-radius:8px;background:#0b1020"></iframe>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      <div class="container">
        <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between">
          <div>
            <a href="./index.html">← 홈으로</a>
          </div>
          <div>
            <span>© <span id="footer-year"></span> Pargame's Blog</span>
          </div>
          <div id="footer-meta"></div>
        </div>
      </div>
    </footer>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="./assets/js/footer.js"></script>
    <script>
        // 그래프 전역 상태/선택자
        let FULL = null; // 전체 데이터
        let CUR = null;  // 필터된 현재 데이터
        let simulation = null;
        let svg = null, inner = null, linkSel = null, nodeSel = null;
        let degMap = null;
        let selectedId = null;

      async function load() {
        const res = await fetch('./public/graph.json', { cache: 'no-store' });
        if (!res.ok) {
          document.getElementById('graph').innerHTML = '그래프가 아직 생성되지 않았습니다. (graph.json 없음)';
          return;
        }
          const data = await res.json();
          FULL = data;
          setupArchives(FULL);
          setupTopicsArea(FULL);
          setupControls();
          rerender(FULL);
        // 리사이즈 시 레이아웃 높이 초기화 문제 방지
          window.addEventListener('resize', () => rerender());
      }

      let state = { archive: 'ALL', topics: new Set(), multi: false };
      function getSelectedArchive(){ return state.archive; }
      function getSelectedTopics(){ return [...state.topics]; }
      function isMulti(){ return !!state.multi; }
      function setSelectedArchive(a){ state.archive = a || 'ALL'; setURL(); }
      function clearTopics(){ state.topics.clear(); setURL(); }
      function setSingleTopic(t){ state.topics.clear(); if (t && t !== 'ALL') state.topics.add(t); setURL(); }
      function toggleTopic(t){ if (!t) return; if (state.topics.has(t)) state.topics.delete(t); else state.topics.add(t); setURL(); }
      function setURL(){
        const u = new URL(location.href);
        if (state.archive && state.archive !== 'ALL') u.searchParams.set('archive', state.archive); else u.searchParams.delete('archive');
        // sync topics
        if (isMulti()) {
          const arr = getSelectedTopics();
          u.searchParams.delete('topic');
          if (arr.length) u.searchParams.set('topics', arr.join(',')); else u.searchParams.delete('topics');
          u.searchParams.set('multi', '1');
        } else {
          u.searchParams.delete('topics');
          u.searchParams.delete('multi');
          const arr = getSelectedTopics();
          if (arr.length) u.searchParams.set('topic', arr[0]); else u.searchParams.delete('topic');
        }
        history.replaceState({}, '', u);
      }

      function setupArchives(data){
  const u = new URL(location.href);
  const archiveParam = u.searchParams.get('archive');
        if (archiveParam) setSelectedArchive(archiveParam);
        const container = document.getElementById('archives');
        const list = data.archives || [];
        container.innerHTML = list.map(a => `<button class="btn" data-arch="${a}">${a}</button>`).join('');
        const buttons = container.querySelectorAll('button');
        function refreshActive(){ buttons.forEach(b => b.classList.toggle('active', b.getAttribute('data-arch')===getSelectedArchive())); }
        buttons.forEach(btn => btn.addEventListener('click', () => { setSelectedArchive(btn.getAttribute('data-arch')); setSelectedTopic('ALL'); refreshActive(); rerender(); }));
        if (!archiveParam && list.length) { setSelectedArchive(list[0]); refreshActive(); }
        refreshActive();
      }

      function setupTopicsArea(data){
        const u = new URL(location.href);
        const multiParam = u.searchParams.get('multi') === '1';
        state.multi = multiParam;
        const ck = document.getElementById('topic-multi');
        if (ck) {
          ck.checked = multiParam;
          ck.addEventListener('change', () => { state.multi = ck.checked; clearTopics(); renderTopics(); rerender(); });
        }
        const topicParam = u.searchParams.get('topic');
        const topicsParam = u.searchParams.get('topics');
        const topicsAll = data.topicsByArchive || {};
        function renderTopics(){
          const curArch = getSelectedArchive();
          const list = (topicsAll[curArch] || []).filter(t => t !== curArch); // 아카이브명은 제외
          const wrap = document.getElementById('topics');
          wrap.innerHTML = list.map(t => `<button class="btn" data-topic="${t}">${t}</button>`).join('');
          const buttons = wrap.querySelectorAll('button');
          function refreshActive(){
            const sel = new Set(getSelectedTopics());
            buttons.forEach(b => b.classList.toggle('active', sel.has(b.getAttribute('data-topic'))));
          }
          buttons.forEach(btn => btn.addEventListener('click', () => {
            const t = btn.getAttribute('data-topic');
            if (isMulti()) toggleTopic(t); else setSingleTopic(t);
            refreshActive();
            rerender();
          }));
          document.getElementById('topic-reset').onclick = () => { clearTopics(); refreshActive(); rerender(); };
          // initialize from URL
          if (isMulti() && topicsParam) {
            clearTopics();
            topicsParam.split(',').map(s=>s.trim()).filter(s=>s && list.includes(s)).forEach(s => state.topics.add(s));
          } else if (!isMulti() && topicParam && list.includes(topicParam)) {
            setSingleTopic(topicParam);
          }
          refreshActive();
        }
        renderTopics();
        // 아카이브가 바뀌면 주제 버튼도 갱신되도록 관찰
        const observer = new MutationObserver(()=>renderTopics());
        observer.observe(document.getElementById('archives'), { childList:true, subtree:true });
      }

      function filter(data, archive, topics, multi) {
        let nodes = data.nodes;
        if (archive && archive !== 'ALL') nodes = nodes.filter(n => n.archive === archive);
        const sel = new Set(topics||[]);
        if (sel.size > 0) {
          if (multi) nodes = nodes.filter(n => [...sel].every(t => (n.topics||[]).includes(t)));
          else nodes = nodes.filter(n => (n.topics||[]).includes([...sel][0]));
        }
        const ids = new Set(nodes.map(n => n.id));
        const edges = data.edges.filter(e => ids.has(e.source) && ids.has(e.target));
        return { nodes, edges };
      }

      function setupControls(){
        const vd = document.getElementById('val-distance');
        const vc = document.getElementById('val-charge');
        const vw = document.getElementById('val-width');
        const vs = document.getElementById('val-size');
        function syncVals(){ if(vd) vd.textContent = document.getElementById('ctl-distance').value; if(vc) vc.textContent = document.getElementById('ctl-charge').value; if(vw) vw.textContent = document.getElementById('ctl-width').value; if(vs) vs.textContent = document.getElementById('ctl-size').value; }
        syncVals();
        document.getElementById('ctl-distance').addEventListener('input', () => { syncVals(); updateForces(); });
        document.getElementById('ctl-charge').addEventListener('input', () => { syncVals(); updateForces(); });
        document.getElementById('ctl-width').addEventListener('input', () => { syncVals(); updateStyles(); });
        document.getElementById('ctl-size').addEventListener('input', () => { syncVals(); updateStyles(); });
        const btn = document.getElementById('ctl-reset');
        if (btn) btn.addEventListener('click', () => {
          ['ctl-distance','ctl-charge','ctl-width','ctl-size'].forEach(id => {
            const el = document.getElementById(id);
            const def = el.getAttribute('data-default');
            if (def != null) el.value = def;
          });
          syncVals();
          updateStyles();
          updateForces();
        });
      }

      function rerender(full){
        // full 데이터가 없으면 다시 불러옴
        if (!full) {
          if (!FULL) return;
          renderGraph(filter(FULL, getSelectedArchive(), getSelectedTopics(), isMulti()));
          renderDocList(FULL);
        } else {
          renderGraph(filter(full, getSelectedArchive(), getSelectedTopics(), isMulti()));
          renderDocList(full);
        }
      }

  function renderGraph(data) {
  const width = document.getElementById('graph').clientWidth;
  const height = document.getElementById('graph').clientHeight;
  d3.select('#graph').selectAll('*').remove();
  svg = d3.select('#graph').append('svg').attr('width', width).attr('height', height);
  inner = svg.append('g');

        const distance = +document.getElementById('ctl-distance').value;
        const charge = +document.getElementById('ctl-charge').value;
        const linkWidth = +document.getElementById('ctl-width').value;
        const sizeBase = +document.getElementById('ctl-size').value;

        simulation = d3.forceSimulation(data.nodes)
          .force('link', d3.forceLink(data.edges).id(d => d.id).distance(distance))
          .force('charge', d3.forceManyBody().strength(charge))
          .force('center', d3.forceCenter(width / 2, height / 2))
          .alpha(1)
          .alphaDecay(0.03)
          .velocityDecay(0.2);

        linkSel = inner.append('g').selectAll('line')
          .data(data.edges)
          .enter().append('line')
          .attr('class', 'link')
          .attr('stroke-width', linkWidth);

        const topicKey = (topics) => {
          const t = (topics && topics.length) ? topics[0] : '(root)';
          return (t && t !== '(root)') ? `topic-${(Math.abs(hashCode(t)) % 5) + 1}` : 'topic-ROOT';
        };
  nodeSel = inner.append('g').selectAll('g')
          .data(data.nodes)
          .enter().append('g')
          .attr('class', d => `node ${topicKey(d.topics)}`)
          .call(d3.drag()
            .on('start', dragstarted)
            .on('drag', dragged)
            .on('end', dragended));

        // 차수 기반 반지름 계산
        degMap = new Map(data.nodes.map(n => [n.id, 0]));
        for (const e of data.edges) {
          const s = e.source.id || e.source;
          const t = e.target.id || e.target;
          degMap.set(s, (degMap.get(s) || 0) + 1);
          degMap.set(t, (degMap.get(t) || 0) + 1);
        }
  const radius = d => Math.max(sizeBase, Math.min(sizeBase+16, sizeBase + Math.sqrt(degMap.get(d.id) || 0) * 4));

  // 충돌 방지(물리감 향상)
  simulation.force('collide', d3.forceCollide(radius).strength(0.7));

  nodeSel.append('circle').attr('r', radius).attr('stroke-width', Math.max(1, linkWidth/2));
  nodeSel.append('text').attr('x', 12).attr('y', 4).text(d => d.label || d.id);

  nodeSel.on('click', (_, d) => {
          // 아래 C 뷰어 영역에 문서를 연다
          const url = new URL('./viewer.html', location.href);
          url.searchParams.set('id', d.id);
          const sel = getSelectedTopics();
          if (sel.length) url.searchParams.set('topic', sel[0]);
          const arch = getSelectedArchive();
          if (arch && arch !== 'ALL') url.searchParams.set('archive', arch);
          document.getElementById('doc-view').src = url.toString();
          document.getElementById('doc-view').scrollIntoView({ behavior:'smooth', block:'start' });
    // 선택 상태 표시
    selectedId = d.id;
    nodeSel.classed('selected', n => n.id === selectedId);
        });

  simulation.on('tick', () => {
    linkSel
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
        });

        function dragstarted(event) {
          if (!event.active) simulation.alphaTarget(0.3).restart();
          event.subject.fx = event.subject.x;
          event.subject.fy = event.subject.y;
        }
        function dragged(event) {
          event.subject.fx = event.x;
          event.subject.fy = event.y;
        }
        function dragended(event) {
          if (!event.active) simulation.alphaTarget(0);
          event.subject.fx = null;
          event.subject.fy = null;
        }

        function hashCode(str){
          let h = 0; for (let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i); h|=0;} return h;
        }

        // 줌/팬
        svg.call(d3.zoom().scaleExtent([0.2, 3]).on('zoom', (ev) => {
          inner.attr('transform', ev.transform);
        }));

        // 이웃 하이라이트
        const adj = new Map();
        for (const n of data.nodes) adj.set(n.id, new Set());
        for (const e of data.edges) {
          const s = e.source.id || e.source;
          const t = e.target.id || e.target;
          adj.get(s).add(t);
          adj.get(t).add(s);
        }
        nodeSel.on('mouseover', (_, d) => highlight(d.id));
        nodeSel.on('mouseout', clearHighlight);
        function highlight(id){
          nodeSel.classed('faded', n => (n.id !== id && !adj.get(id).has(n.id)));
          linkSel.classed('faded', e => {
            const s = e.source.id || e.source;
            const t = e.target.id || e.target;
            return !(s === id || t === id);
          });
        }
        function clearHighlight(){
          nodeSel.classed('faded', false);
          linkSel.classed('faded', false);
        }

        CUR = data;
        // 초기 스타일 동기화
        updateStyles();
      }

      function renderDocList(full){
        const arch = getSelectedArchive();
        const topics = getSelectedTopics();
        const multi = isMulti();
        let nodes = full.nodes;
        if (arch && arch !== 'ALL') nodes = nodes.filter(n => n.archive === arch);
        if (topics.length) {
          if (multi) nodes = nodes.filter(n => topics.every(t => (n.topics||[]).includes(t)));
          else nodes = nodes.filter(n => (n.topics||[]).includes(topics[0]));
        }
        nodes = nodes.sort((a,b)=> (a.label||a.id).localeCompare(b.label||b.id));
        const ul = document.getElementById('doc-list');
          ul.innerHTML = nodes.map(n => {
            const topics = n.topics || [];
            const meta = topics.length ? `(${topics.join(', ')})` : '';
            return `<li><a data-id="${n.id}" href="#">${n.label || n.id}</a>${meta ? ` <span class=\"legend\">${meta}</span>` : ''}</li>`;
          }).join('');
        ul.querySelectorAll('a').forEach(a => a.addEventListener('click', (e) => {
          e.preventDefault();
          const id = a.getAttribute('data-id');
          const url = new URL('./viewer.html', location.href);
          url.searchParams.set('id', id);
          if (topics.length) url.searchParams.set('topic', topics[0]);
          if (arch && arch !== 'ALL') url.searchParams.set('archive', arch);
          document.getElementById('doc-view').src = url.toString();
        }));
      }

      function updateForces(){
        if (!simulation) return;
        const distance = +document.getElementById('ctl-distance').value;
        const charge = +document.getElementById('ctl-charge').value;
        const linkForce = simulation.force('link');
        if (linkForce) linkForce.distance(distance);
        const chargeForce = simulation.force('charge');
        if (chargeForce) chargeForce.strength(charge);
        simulation.alpha(0.3).restart();
      }

      function updateStyles(){
        if (!linkSel || !nodeSel) return;
        const linkWidth = +document.getElementById('ctl-width').value;
        const sizeBase = +document.getElementById('ctl-size').value;
        linkSel.attr('stroke-width', linkWidth);
        const radius = d => Math.max(sizeBase, Math.min(sizeBase+16, sizeBase + Math.sqrt(degMap ? (degMap.get(d.id) || 0) : 0) * 4));
        nodeSel.select('circle').attr('r', radius).attr('stroke-width', Math.max(1, linkWidth/2));
        // 충돌 반경도 갱신
        if (simulation) {
          const col = simulation.force('collide');
          if (col) col.radius(radius);
          simulation.alpha(0.15).restart();
        }
        // 선택 노드 강조 유지
        nodeSel.classed('selected', n => n.id === selectedId);
      }

  load();
  // populate footer with repo info
  window.populateFooter && window.populateFooter({ repo: 'pargame/MyBlog' });
    </script>
  </body>
  </html>
