<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>문서 그래프</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <style>
      .graph-wrap { height: 70vh; background: #0b1020; border: 1px solid #1e2749; border-radius: 12px; }
      .legend { color: var(--muted); font-size: 14px; }
      #graph { width: 100%; height: 100%; }
      .node { cursor: pointer; }
  .node circle { fill: #6ea8fe; }
  .node.topic-ROOT circle { fill: #6ea8fe; }
  .node.topic-1 circle { fill: #60d394; }
  .node.topic-2 circle { fill: #ee6055; }
  .node.topic-3 circle { fill: #ffd97d; }
  .node.topic-4 circle { fill: #aaf683; }
  .node.topic-5 circle { fill: #57c7ff; }
      .node text { fill: #e7ecff; font-size: 12px; }
      .link { stroke: #3a4b86; stroke-opacity: .6; }
      .link:hover { stroke-opacity: 1; }
  .faded { opacity: 0.15; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1>문서 그래프</h1>
        <p class="tagline">docs/*.md 의 [[링크]]를 자동으로 시각화합니다</p>
      </div>
    </header>
    <main class="container">
      <div class="card">
        <label for="archive">아카이브:</label>
        <select id="archive"></select>
        &nbsp;&nbsp;
        <label for="topic">주제:</label>
        <select id="topic"></select>
        <span class="legend">노드를 드래그해 재배치할 수 있습니다. 노드 클릭 시 문서를 엽니다.</span>
      </div>
      <div class="graph-wrap" id="graph"></div>
    </main>
    <footer class="site-footer">
      <div class="container"><a href="./index.html">← 홈으로</a></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script>
      async function load() {
        const res = await fetch('./public/graph.json', { cache: 'no-store' });
        if (!res.ok) {
          document.getElementById('graph').innerHTML = '그래프가 아직 생성되지 않았습니다. (graph.json 없음)';
          return;
        }
        const data = await res.json();
        setupArchivesAndTopics(data);
        renderGraph(filter(data, getSelectedArchive(), getSelectedTopic()));
      }

      function getSelectedArchive() {
        return document.getElementById('archive').value || 'ALL';
      }
      function getSelectedTopic() {
        return document.getElementById('topic').value || 'ALL';
      }
      function setupArchivesAndTopics(data) {
        const u = new URL(location.href);
        const archiveParam = u.searchParams.get('archive');
        const topicParam = u.searchParams.get('topic');

        const archives = ['ALL', ...(data.archives || [])];
        const archSel = document.getElementById('archive');
        archSel.innerHTML = archives.map(a => `<option value="${a}">${a}</option>`).join('');
        if (archiveParam && archives.includes(archiveParam)) archSel.value = archiveParam;

        const topicsAll = data.topicsByArchive || {};
        function refreshTopics() {
          const curArch = getSelectedArchive();
          const topicList = curArch === 'ALL'
            ? ['ALL', ...(data.topics || [])]
            : ['ALL', ...((topicsAll[curArch] || []))];
          const topicSel = document.getElementById('topic');
          topicSel.innerHTML = topicList.map(t => `<option value="${t}">${t}</option>`).join('');
          if (topicParam && topicList.includes(topicParam)) topicSel.value = topicParam;
        }
        refreshTopics();

        archSel.addEventListener('change', async () => {
          refreshTopics();
          const res = await fetch('./public/graph.json', { cache: 'no-store' });
          const fresh = await res.json();
          renderGraph(filter(fresh, getSelectedArchive(), getSelectedTopic()));
        });
        document.getElementById('topic').addEventListener('change', async () => {
          const res = await fetch('./public/graph.json', { cache: 'no-store' });
          const fresh = await res.json();
          renderGraph(filter(fresh, getSelectedArchive(), getSelectedTopic()));
        });
      }

      function filter(data, archive, topic) {
        let nodes = data.nodes;
        if (archive && archive !== 'ALL') nodes = nodes.filter(n => n.archive === archive);
        if (topic && topic !== 'ALL') nodes = nodes.filter(n => n.topic === topic);
        const ids = new Set(nodes.map(n => n.id));
        const edges = data.edges.filter(e => ids.has(e.source) && ids.has(e.target));
        return { nodes, edges };
      }

  function renderGraph(data) {
  const width = document.getElementById('graph').clientWidth;
  const height = document.getElementById('graph').clientHeight;
  d3.select('#graph').selectAll('*').remove();
  const svg = d3.select('#graph').append('svg').attr('width', width).attr('height', height);
  const inner = svg.append('g');

        const simulation = d3.forceSimulation(data.nodes)
          .force('link', d3.forceLink(data.edges).id(d => d.id).distance(120))
          .force('charge', d3.forceManyBody().strength(-320))
          .force('center', d3.forceCenter(width / 2, height / 2));

        const link = inner.append('g').selectAll('line')
          .data(data.edges)
          .enter().append('line')
          .attr('class', 'link');

        const topicKey = (t) => (t && t !== '(root)') ? `topic-${(Math.abs(hashCode(t)) % 5) + 1}` : 'topic-ROOT';
        const node = inner.append('g').selectAll('g')
          .data(data.nodes)
          .enter().append('g')
          .attr('class', d => `node ${topicKey(d.topic)}`)
          .call(d3.drag()
            .on('start', dragstarted)
            .on('drag', dragged)
            .on('end', dragended));

        // 차수 기반 반지름 계산
        const deg = new Map(data.nodes.map(n => [n.id, 0]));
        for (const e of data.edges) {
          deg.set(e.source, (deg.get(e.source) || 0) + 1);
          deg.set(e.target, (deg.get(e.target) || 0) + 1);
        }
        const radius = d => Math.max(6, Math.min(22, 6 + Math.sqrt(deg.get(d.id) || 0) * 4));

        node.append('circle').attr('r', radius);
        node.append('text').attr('x', 12).attr('y', 4).text(d => d.id);

        node.on('click', (_, d) => {
          // viewer로 이동해 문서 내용을 페이지 내에서 열기
          const url = new URL('./viewer.html', location.href);
          url.searchParams.set('id', d.id);
          const topic = getSelectedTopic();
          if (topic && topic !== 'ALL') url.searchParams.set('topic', topic);
          const arch = getSelectedArchive();
          if (arch && arch !== 'ALL') url.searchParams.set('archive', arch);
          window.location.href = url.toString();
        });

  simulation.on('tick', () => {
          link
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);
          node.attr('transform', d => `translate(${d.x},${d.y})`);
        });

        function dragstarted(event) {
          if (!event.active) simulation.alphaTarget(0.3).restart();
          event.subject.fx = event.subject.x;
          event.subject.fy = event.subject.y;
        }
        function dragged(event) {
          event.subject.fx = event.x;
          event.subject.fy = event.y;
        }
        function dragended(event) {
          if (!event.active) simulation.alphaTarget(0);
          event.subject.fx = null;
          event.subject.fy = null;
        }

        function hashCode(str){
          let h = 0; for (let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i); h|=0;} return h;
        }

        // 줌/팬
        svg.call(d3.zoom().scaleExtent([0.2, 3]).on('zoom', (ev) => {
          inner.attr('transform', ev.transform);
        }));

        // 이웃 하이라이트
        const adj = new Map();
        for (const n of data.nodes) adj.set(n.id, new Set());
        for (const e of data.edges) {
          adj.get(e.source).add(e.target);
          adj.get(e.target).add(e.source);
        }
        node.on('mouseover', (_, d) => highlight(d.id));
        node.on('mouseout', clearHighlight);
        function highlight(id){
          node.classed('faded', n => (n.id !== id && !adj.get(id).has(n.id)));
          link.classed('faded', e => !(e.source.id === id || e.target.id === id || e.source === id || e.target === id || adj.get(id).has(e.source.id || e.source) || adj.get(id).has(e.target.id || e.target)));
        }
        function clearHighlight(){
          node.classed('faded', false);
          link.classed('faded', false);
        }
      }

      load();
    </script>
  </body>
  </html>
