<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>문서 그래프</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <style>
      .graph-wrap { height: 70vh; background: #0b1020; border: 1px solid #1e2749; border-radius: 12px; }
      .legend { color: var(--muted); font-size: 14px; }
      #graph { width: 100%; height: 100%; }
      .node { cursor: pointer; }
      .node circle { fill: #6ea8fe; }
      .node text { fill: #e7ecff; font-size: 12px; }
      .link { stroke: #3a4b86; stroke-opacity: .6; }
      .link:hover { stroke-opacity: 1; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1>문서 그래프</h1>
        <p class="tagline">docs/*.md 의 [[링크]]를 자동으로 시각화합니다</p>
      </div>
    </header>
    <main class="container">
      <p class="legend">노드를 드래그해 재배치할 수 있습니다. 클릭하면 해당 문서로 이동합니다.</p>
      <div class="graph-wrap" id="graph"></div>
    </main>
    <footer class="site-footer">
      <div class="container"><a href="./index.html">← 홈으로</a></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script>
      async function load() {
        const res = await fetch('./public/graph.json', { cache: 'no-store' });
        if (!res.ok) {
          document.getElementById('graph').innerHTML = '그래프가 아직 생성되지 않았습니다. (graph.json 없음)';
          return;
        }
        const data = await res.json();
        renderGraph(data);
      }

      function renderGraph(data) {
        const width = document.getElementById('graph').clientWidth;
        const height = document.getElementById('graph').clientHeight;
        const svg = d3.select('#graph').append('svg').attr('width', width).attr('height', height);

        const simulation = d3.forceSimulation(data.nodes)
          .force('link', d3.forceLink(data.edges).id(d => d.id).distance(120))
          .force('charge', d3.forceManyBody().strength(-320))
          .force('center', d3.forceCenter(width / 2, height / 2));

        const link = svg.append('g').selectAll('line')
          .data(data.edges)
          .enter().append('line')
          .attr('class', 'link');

        const node = svg.append('g').selectAll('g')
          .data(data.nodes)
          .enter().append('g')
          .attr('class', 'node')
          .call(d3.drag()
            .on('start', dragstarted)
            .on('drag', dragged)
            .on('end', dragended));

        node.append('circle').attr('r', 10);
        node.append('text').attr('x', 12).attr('y', 4).text(d => d.id);

        node.on('click', (_, d) => {
          // docs/{id}.md 원문으로 이동(깃헙에서 렌더링되므로 보기 편함)
          const gh = `https://github.com/pargame/MyBlog/blob/main/docs/${encodeURIComponent(d.id)}.md`;
          window.open(gh, '_blank');
        });

        simulation.on('tick', () => {
          link
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);
          node.attr('transform', d => `translate(${d.x},${d.y})`);
        });

        function dragstarted(event) {
          if (!event.active) simulation.alphaTarget(0.3).restart();
          event.subject.fx = event.subject.x;
          event.subject.fy = event.subject.y;
        }
        function dragged(event) {
          event.subject.fx = event.x;
          event.subject.fy = event.y;
        }
        function dragended(event) {
          if (!event.active) simulation.alphaTarget(0);
          event.subject.fx = null;
          event.subject.fy = null;
        }
      }

      load();
    </script>
  </body>
  </html>
