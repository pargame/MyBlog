<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>문서 그래프</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <style>
      .graph-wrap { height: 70vh; background: #0b1020; border: 1px solid #1e2749; border-radius: 12px; }
      .legend { color: var(--muted); font-size: 14px; }
      #graph { width: 100%; height: 100%; }
      .node { cursor: pointer; }
      .node circle { fill: #6ea8fe; }
      .node text { fill: #e7ecff; font-size: 12px; }
      .link { stroke: #3a4b86; stroke-opacity: .6; }
      .link:hover { stroke-opacity: 1; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1>문서 그래프</h1>
        <p class="tagline">docs/*.md 의 [[링크]]를 자동으로 시각화합니다</p>
      </div>
    </header>
    <main class="container">
      <div class="card">
        <label for="topic">주제 선택:</label>
        <select id="topic"></select>
        <span class="legend">노드를 드래그해 재배치할 수 있습니다. 노드 클릭 시 문서를 엽니다.</span>
      </div>
      <div class="graph-wrap" id="graph"></div>
    </main>
    <footer class="site-footer">
      <div class="container"><a href="./index.html">← 홈으로</a></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script>
      async function load() {
        const res = await fetch('./public/graph.json', { cache: 'no-store' });
        if (!res.ok) {
          document.getElementById('graph').innerHTML = '그래프가 아직 생성되지 않았습니다. (graph.json 없음)';
          return;
        }
        const data = await res.json();
        setupTopics(data);
        renderGraph(filterByTopic(data, getSelectedTopic()));
      }

      function getSelectedTopic() {
        return document.getElementById('topic').value || 'ALL';
      }
      function setupTopics(data) {
        const select = document.getElementById('topic');
        const topics = ['ALL', ...(data.topics || [] )];
        select.innerHTML = topics.map(t => `<option value="${t}">${t}</option>`).join('');
        select.addEventListener('change', async () => {
          const res = await fetch('./public/graph.json', { cache: 'no-store' });
          const fresh = await res.json();
          renderGraph(filterByTopic(fresh, getSelectedTopic()));
        });
        // URL 파라미터로 topic 지정 가능
        const u = new URL(location.href);
        const t = u.searchParams.get('topic');
        if (t && topics.includes(t)) {
          select.value = t;
        }
      }

      function filterByTopic(data, topic) {
        if (!topic || topic === 'ALL') return data;
        const nodes = data.nodes.filter(n => n.topic === topic);
        const ids = new Set(nodes.map(n => n.id));
        const edges = data.edges.filter(e => ids.has(e.source) && ids.has(e.target));
        return { nodes, edges, topics: data.topics };
      }

      function renderGraph(data) {
        const width = document.getElementById('graph').clientWidth;
        const height = document.getElementById('graph').clientHeight;
        d3.select('#graph').selectAll('*').remove();
        const svg = d3.select('#graph').append('svg').attr('width', width).attr('height', height);

        const simulation = d3.forceSimulation(data.nodes)
          .force('link', d3.forceLink(data.edges).id(d => d.id).distance(120))
          .force('charge', d3.forceManyBody().strength(-320))
          .force('center', d3.forceCenter(width / 2, height / 2));

        const link = svg.append('g').selectAll('line')
          .data(data.edges)
          .enter().append('line')
          .attr('class', 'link');

        const node = svg.append('g').selectAll('g')
          .data(data.nodes)
          .enter().append('g')
          .attr('class', 'node')
          .call(d3.drag()
            .on('start', dragstarted)
            .on('drag', dragged)
            .on('end', dragended));

        node.append('circle').attr('r', 10);
        node.append('text').attr('x', 12).attr('y', 4).text(d => d.id);

        node.on('click', (_, d) => {
          // viewer로 이동해 문서 내용을 페이지 내에서 열기
          const url = new URL('./viewer.html', location.href);
          url.searchParams.set('id', d.id);
          window.location.href = url.toString();
        });

        simulation.on('tick', () => {
          link
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);
          node.attr('transform', d => `translate(${d.x},${d.y})`);
        });

        function dragstarted(event) {
          if (!event.active) simulation.alphaTarget(0.3).restart();
          event.subject.fx = event.subject.x;
          event.subject.fy = event.subject.y;
        }
        function dragged(event) {
          event.subject.fx = event.x;
          event.subject.fy = event.y;
        }
        function dragended(event) {
          if (!event.active) simulation.alphaTarget(0);
          event.subject.fx = null;
          event.subject.fy = null;
        }
      }

      load();
    </script>
  </body>
  </html>
